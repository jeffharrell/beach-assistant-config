extra_module_url:
  - /hacsfiles/lovelace-card-mod/card-mod.js

# Colors
# https://github.com/home-assistant/frontend/blob/master/src/resources/theme/color.globals.ts
themes:
  no_card:
    card-mod-theme: no_card

    primary-text-color: "#fff"
    secondary-text-color: "#ccc"

    ha-card-border-width: "0"
    ha-card-border-radius: "0"
    card-background-color: "transparent"

    card-mod-card-yaml: |
      .: |
        ha-state-icon {
          filter: none !important;
        }

  padded_card:
    card-mod-theme: padded_card

    primary-text-color: "#fff"
    secondary-text-color: "#ccc"

    card-mod-card-yaml: |
      .: |
        ha-card {
          margin: 25px 0 0;
          height: auto;
          transition: none;
        }

        ha-card h1 {
          padding: 5px 15px 10px;
        }

  settings_card:
    card-mod-theme: settings_card

    primary-text-color: "#fff"
    secondary-text-color: "#ccc"
    card-background-color: "transparent"

    card-mod-card-yaml: |
      .: |
        ha-card {
          --ha-icon-display: none;
          --primary-text-color: #E0E0E0;

          border-color: transparent;

          margin: 40px 0 0 -40px;
          height: auto;
          transition: none;
        }

        #states {
          padding: 0;
        }

  round_button: 
    card-mod-theme: round_button

    card-mod-card-yaml: |
      ha-card {
        border-radius: 28px !important;
      }

  secondary_view:
    card-mod-theme: secondary_view 

    primary-background-color: "#213f49" 
    card-background-color: "#284e5a"

    primary-text-color: "#fff"
    secondary-text-color: "#ccc"

  app_theme:
    card-mod-theme: app_theme

    primary-background-color: "#284e5a"
    card-background-color: "#213f49" 
    secondary-background-color: "var(--primary-background-color)"

    primary-text-color: "#fff"
    secondary-text-color: "#ccc"

    accent-color: "orange"

    # Header
    app-header-text-color: "var(--primary-text-color)"
    app-header-background-color: "var(--primary-background-color)"
    app-header-selection-bar-color: "transparent"
    mdc-top-app-bar-fixed-box-shadow: "none"

    # Cards
    ha-card-border-width: "1px"
    ha-card-border-radius: "28px"
    ha-card-header-font-size: "15px"

    divider-color: "rgba(0, 0, 0, 0.15)"
    code-editor-background-color: "#000"
    input-ink-color: "#000"

    # Icons
    state-icon-color: "#E0E0E0"
    state-active-color: "var(--accent-color)"
    state-inactive-color: "var(--state-icon-color)"

    state-light-active-color: "var(--state-active-color)"
    state-binary_sensor-active-color: "var(--state-active-color)"
    state-cover-open-color: "var(--state-active-color)"
    state-media_player-on-color: "var(--state-active-color)"
    state-media_player-active-color: "var(--state-active-color)"
    state-climate-auto-color: "var(--state-active-color)"
    state-climate-cool-color: "var(--state-active-color)"
    state-climate-heat-color: "var(--state-active-color)"
    state-climate-fan_only-color: "var(--state-active-color)"

    # CSS Overrides
    card-mod-more-info-yaml: |
      ha-more-info-info $ more-info-content $ more-info-light $: |
          .controls {  }

    card-mod-root: |
      .header {
        position: relative !important;
        top: auto !important;
        height: auto !important;
        width: auto !important;
      }

      .header .main-title {
        font-size: 1.3em;
        font-weight: bold;
      }

      .header .toolbar {
        border: 0 !important;
      }

      #view {
        padding: 40px 0 0 !important;
      }

      @media only screen and (hover: none) and (pointer: coarse) {
        .header .main-title {
          margin-left: 10px;
        }
      }
