title: "Outside"
path: "outside"
back_path: "home"
subview: true
theme: secondary_view
cards:

  - type: vertical-stack
    cards:

      # tiles
      - type: grid
        columns: 2
        square: false
        cards:
          - type: tile
            entity: group.downstairs_shades
            name: "Downstairs"
            icon: mdi:window-shutter
            hide_state: true
            theme: round_button
            tap_action:
              action: more-info
            icon_tap_action:
              action: more-info

          - type: tile
            entity: group.upstairs_shades
            name: "Upstairs"
            icon: mdi:window-shutter
            hide_state: true
            theme: round_button
            tap_action:
              action: more-info
            icon_tap_action:
              action: more-info

          - type: tile
            entity: group.shade_automation
            hide_state: true
            theme: round_button
            tap_action:
              action: toggle
            icon_tap_action:
              action: toggle

      # what's on
      - type: entity-filter
        card:
          state_color: true
          show_header_toggle: false
          theme: padded_card
        entities:
          - binary_sensor.bathroom_window
          - binary_sensor.driveway_window
          - binary_sensor.kitchen_window
          - binary_sensor.master_slider
          - binary_sensor.front_door
          - binary_sensor.kitchen_door
          - binary_sensor.bay_window_left
          - binary_sensor.bay_window_right
          - binary_sensor.downstairs_front_window_left
          - binary_sensor.downstairs_front_window_right
        conditions:
          - condition: or
            conditions:
            - condition: state
              state: "open"
            - condition: state
              state: "on"
        show_empty: false

      # settings
      - type: entities
        state_color: true
        theme: settings_card
        entities:
          - entity: input_boolean.camera_motion_enabled
            name: "Motion alerts"
            icon: mdi:creation
            tap_action:
              action: none