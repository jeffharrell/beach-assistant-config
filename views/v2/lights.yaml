title: "Lights"
path: "lights"
back_path: "/lovelace/home"
subview: true
theme: secondary_view
cards:

  - type: vertical-stack
    cards:

      # tiles
      - type: grid
        columns: 2
        square: false
        cards:
          - type: tile
            entity: script.mood_lights
            hide_state: true
            theme: round_button
            tap_action:
              action: toggle
            icon_tap_action:
              action: toggle

          - type: tile
            entity: script.dinner_lights
            hide_state: true
            theme: round_button
            tap_action:
              action: toggle
            icon_tap_action:
              action: toggle

      # lights
      - type: 'custom:mod-card'
        style: |
          ha-card {
            --ha-card-border-color: var(--secondary-background-color);

            margin-top: 25px;
            padding: 6px 0;
            background-color: var(--secondary-background-color);
          }
        card:
          type: vertical-stack
          cards:
            - type: tile
              entity: light.downstairs
              hide_state: true
              features_position: inline
              features:
                - type: light-brightness

            - type: tile
              entity: light.upstairs
              hide_state: true
              features_position: inline
              features:
                - type: light-brightness

            - type: tile
              entity: light.outside
              hide_state: true

      # settings
      - type: entities
        state_color: true
        theme: settings_card
        entities:
          - entity: automation.lights_automatic_outside_lights
            name: "Opening doors turns on lights"
            icon: mdi:creation
            tap_action:
              action: none